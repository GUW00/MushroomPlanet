<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2d5a1b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mushroom Planet">
  <link rel="apple-touch-icon" href="/images/icon-192.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>My Farm | Mushroom Planet</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a14;
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
      touch-action: none;
    }

    /* --- DESKTOP BLOCK --- */
    #desktop-block {
      display: none;
      position: fixed; inset: 0;
      background: #0e0e1a;
      z-index: 9999;
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1rem; color: #fff;
      text-align: center; padding: 2rem;
    }
    #desktop-block .icon { font-size: 4rem; }
    #desktop-block h2 { font-size: 1.4rem; color: #a8ff78; }
    #desktop-block p { color: rgba(255,255,255,0.6); font-size: 0.9rem; max-width: 320px; line-height: 1.5; }

    /* --- LOADING --- */
    #loading {
      position: fixed; inset: 0;
      background: #0e0e1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1rem; z-index: 9000;
      transition: opacity 0.6s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading .shroom { font-size: 3rem; animation: bob 1s ease-in-out infinite alternate; }
    @keyframes bob { from { transform: translateY(0); } to { transform: translateY(-10px); } }
    #loading p { color: rgba(255,255,255,0.5); font-size: 0.8rem; letter-spacing: 0.1em; }
    #load-bar-wrap {
      width: 160px; height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px; overflow: hidden;
    }
    #load-bar {
      height: 100%; width: 0%;
      background: #a8ff78;
      border-radius: 2px;
      transition: width 0.3s;
    }

    /* --- CANVAS --- */
    #farm-canvas {
      position: absolute;
      top: 0; left: 0;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: grab;
    }
    #farm-canvas:active { cursor: grabbing; }

    /* --- TOP BAR --- */
    #top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 50px;
      background: rgba(8,8,20,0.88);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 0.9rem;
      z-index: 100;
      border-bottom: 1px solid rgba(168,255,120,0.12);
    }
    .top-back {
      width: 34px; height: 34px;
      background: rgba(168,255,120,0.08);
      border: 1px solid rgba(168,255,120,0.25);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #a8ff78; font-size: 1rem;
      text-decoration: none; cursor: pointer;
      flex-shrink: 0;
    }
    .top-title {
      font-size: 0.9rem; font-weight: 700;
      color: #a8ff78; letter-spacing: 0.06em;
    }
    .top-coord {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.28);
      font-family: monospace;
      background: rgba(255,255,255,0.05);
      padding: 3px 8px; border-radius: 20px;
    }

    /* --- MINIMAP --- */
    #minimap {
      position: absolute;
      bottom: 78px; right: 10px;
      width: 76px; height: 76px;
      border: 1px solid rgba(168,255,120,0.22);
      border-radius: 6px;
      overflow: hidden;
      z-index: 100;
      opacity: 0.8;
      background: #0a0a14;
    }
    #minimap-canvas {
      width: 100%; height: 100%;
      image-rendering: pixelated;
    }

    /* --- TOOLTIP --- */
    #tooltip {
      position: absolute;
      background: rgba(8,8,20,0.92);
      border: 1px solid rgba(168,255,120,0.3);
      border-radius: 8px;
      padding: 5px 11px;
      font-size: 0.7rem;
      color: #fff;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 200;
      white-space: nowrap;
    }
    #tooltip.show { opacity: 1; }

    /* --- BOTTOM HUD --- */
    #bottom-hud {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 62px;
      background: rgba(8,8,20,0.88);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid rgba(168,255,120,0.12);
      display: flex; align-items: center;
      justify-content: space-around;
      padding: 0 0.4rem;
      z-index: 100;
    }
    .hud-btn {
      display: flex; flex-direction: column;
      align-items: center; gap: 2px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 9px;
      padding: 5px 12px;
      color: rgba(255,255,255,0.4);
      font-size: 0.58rem; font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      min-width: 52px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .hud-btn .hi { font-size: 1.2rem; line-height: 1; }
    .hud-btn.active {
      background: rgba(168,255,120,0.1);
      border-color: rgba(168,255,120,0.35);
      color: #a8ff78;
    }

    /* --- PWA NAV (only in standalone) --- */
    #pwa-nav {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 62px;
      background: #0a0a14;
      border-top: 1px solid rgba(255,255,225,0.08);
      align-items: stretch;
      z-index: 300;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .pwa-tab {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0.2rem;
      text-decoration: none;
      color: rgba(255,255,225,0.32);
      font-family: 'Space Grotesk', monospace;
      font-size: 0.52rem; letter-spacing: 0.05em;
      transition: color 0.2s;
    }
    .pwa-tab span:first-child { font-size: 1.25rem; display: flex; align-items: center; justify-content: center; }
    .pwa-tab.active { color: #a8ff78; }

    /* stage label */
    #stage-badge {
      position: absolute;
      top: 58px; left: 50%;
      transform: translateX(-50%);
      background: rgba(8,8,20,0.7);
      border: 1px solid rgba(168,255,120,0.18);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.58rem;
      color: rgba(168,255,120,0.45);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      z-index: 50;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="desktop-block">
  <div class="icon">📱</div>
  <h2>Mobile & PWA Only</h2>
  <p>Open Mushroom Planet on your phone to explore your farm!</p>
</div>

<div id="loading">
  <div class="shroom">🍄</div>
  <p>LOADING FARM...</p>
  <div id="load-bar-wrap"><div id="load-bar"></div></div>
</div>

<div id="top-bar">
  <a class="top-back" href="/profile.html">&#8592;</a>
  <span class="top-title">🍄 My Farm</span>
  <span class="top-coord" id="coord-display">0, 0</span>
</div>

<div id="stage-badge">Spring Season</div>

<canvas id="farm-canvas"></canvas>
<div id="minimap"><canvas id="minimap-canvas" width="76" height="76"></canvas></div>
<div id="tooltip"></div>

<div id="bottom-hud">
  <div class="hud-btn active" data-tab="farm">
    <span class="hi">🏡</span><span>Farm</span>
  </div>

  </div>
  <div class="hud-btn" data-tab="map">
    <span class="hi">🗺️</span><span>Map</span>
  </div>
</div>

<!-- PWA nav injected by JS if standalone -->
<nav id="pwa-nav">
  <a href="/profile.html" class="pwa-tab">
    <span><img src="/images/icon-192.png" style="width:20px;height:20px;object-fit:contain;border-radius:50%;"></span>
    <span>Profile</span>
  </a>
  <a href="/earn.html" class="pwa-tab">
    <span><img src="/images/earn.png" style="width:20px;height:20px;object-fit:contain;" onerror="this.style.display='none'"></span>
    <span>Earn</span>
  </a>
  <a href="/play.html" class="pwa-tab active">
    <span><img src="/images/shroomfarm.png" style="width:20px;height:20px;object-fit:contain;" onerror="this.style.display='none'"></span>
    <span>Farm</span>
  </a>
  <a href="/convert.html" class="pwa-tab">
    <span><img src="/images/swaps.png" style="width:20px;height:20px;object-fit:contain;" onerror="this.style.display='none'"></span>
    <span>Convert</span>
  </a>
  <a href="/vote.html" class="pwa-tab">
    <span><img src="/images/vote.png" style="width:20px;height:20px;object-fit:contain;" onerror="this.style.display='none'"></span>
    <span>Vote</span>
  </a>
  <a href="/treasury.html" class="pwa-tab">
    <span><img src="/images/treasury.png" style="width:20px;height:20px;object-fit:contain;" onerror="this.style.display='none'"></span>
    <span>Treasury</span>
  </a>
</nav>

<script>
// ============================================================
// DESKTOP GUARD
// ============================================================
(function() {
  const ua = navigator.userAgent;
  const mob = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
  const pwa = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;
  const small = window.innerWidth <= 900;
  if (!mob && !pwa && !small) {
    document.getElementById('desktop-block').style.display = 'flex';
    document.getElementById('loading').style.display = 'none';
  }
})();

// PWA nav: show only in standalone, shift bottom-hud up
(function() {
  const pwa = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;
  if (pwa) {
    document.getElementById('pwa-nav').style.display = 'flex';
    document.getElementById('bottom-hud').style.bottom = '62px';
    document.getElementById('minimap').style.bottom = '134px';
  }
})();

// ============================================================
// CONSTANTS
// ============================================================
const TILE   = 16;   // source tile size in spritesheet
const ZOOM   = 3;    // render at 48px per tile on screen
const TSIZE  = TILE * ZOOM; // 48px rendered tile

// Character frame dims (from analysis)
const CHAR_W  = 16;  // walk frame width in source
const CHAR_H  = 32;  // character height in source (taller than tile)
const IDLE_W  = 32;  // idle frame width
const IDLE_H  = 32;  // idle frame height

// Map dimensions
const MAP_W = 22;
const MAP_H = 26;

// ============================================================
// TILESET TILE COORDS  (col, row in Tileset_Spring.png)
// Tiles are in the RIGHT half of sheet starting at col 6
// So actual srcX = (col - 6) * 16,  srcY = row * 16
// Full sheet is 192px wide, tiles begin at x=96
// ============================================================
// From analysis: right 6 cols (96-191px) contain:
//   rows 0-3:   grass autotile
//   rows 4-6:   dark ground/cliff
//   rows 7-10:  dirt/path autotile (orange)
//   rows 11-12: grass-to-cliff transitions
//   rows 13-19: grass-cliff-dirt mix
const TS_OX = 96; // tileset tile region x offset

// Tile type definitions mapped to tileset source coords [sx, sy]
const TILES = {
  GRASS:      [TS_OX + 16, 0],    // solid grass tile (col7, row0)
  GRASS_TL:   [TS_OX + 0,  0],    // grass top-left corner
  GRASS_TR:   [TS_OX + 32, 0],
  GRASS_BL:   [TS_OX + 0,  32],
  GRASS_BR:   [TS_OX + 32, 32],
  GRASS2:     [TS_OX + 16, 16],   // inner grass
  DIRT:       [TS_OX + 16, 7*16], // dirt center
  DIRT_TL:    [TS_OX + 0,  7*16],
  DIRT_TR:    [TS_OX + 32, 7*16],
  DIRT_BL:    [TS_OX + 0,  9*16],
  DIRT_BR:    [TS_OX + 32, 9*16],
  DIRT_T:     [TS_OX + 16, 7*16],
  DIRT_B:     [TS_OX + 16, 9*16],
  DIRT_L:     [TS_OX + 0,  8*16],
  DIRT_R:     [TS_OX + 32, 8*16],
  PATH:       [TS_OX + 16, 8*16], // dirt path center
};

// ============================================================
// MAP LAYOUT
// 0 = grass, 1 = grass variant, 2 = dirt/path, 3 = dirt farm plot
// Using simple integers, then sprite-mapped in drawTile()
// ============================================================
const G  = 0; // grass
const G2 = 1; // grass2
const D  = 2; // dirt path
const F  = 3; // farm plot (tilled soil)
const W  = 4; // water (drawn procedurally)

// prettier-ignore
const MAP = [
  [G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ],
  [G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ],
  [G ,G2,G ,G ,G ,W ,W ,W ,W ,W ,W ,W ,W ,G ,G ,G ,G ,G2,G ,G ,G ,G ],
  [G ,G ,G ,G ,G ,W ,W ,W ,W ,W ,W ,W ,W ,G ,G ,G ,G ,G ,G ,G ,G ,G ],
  [G ,G ,G ,G ,G ,W ,W ,W ,W ,W ,W ,W ,W ,G ,G ,G ,G ,G ,G ,G ,G ,G ],
  [G ,G ,G2,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G2,G ,G ,G ],
  [G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ],
  [G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ],
  [G ,G ,G ,G ,D ,D ,D ,D ,D ,D ,D ,D ,D ,D ,G ,G ,G ,G ,G ,G ,G ,G ],
  [G ,G ,G ,G ,D ,F ,F ,F ,F ,F ,F ,F ,F ,D ,G ,G ,G ,G ,G ,G ,G ,G ],
  [G ,G ,G ,G ,D ,F ,F ,F ,F ,F ,F ,F ,F ,D ,G ,G ,G ,G ,G ,G ,G ,G ],
  [G ,G ,G ,G ,D ,F ,F ,F ,F ,F ,F ,F ,F ,D ,G ,G ,G ,G ,G ,G ,G ,G ],
  [G ,G ,G ,G ,D ,F ,F ,F ,F ,F ,F ,F ,F ,D ,G ,G ,G ,G ,G ,G ,G ,G ],
  [G ,G ,G ,G ,D ,D ,D ,D ,D ,D ,D ,D ,D ,D ,G ,G ,G ,G ,G ,G ,G ,G ],
  [G ,G ,G ,G ,G ,G ,G ,D ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ],
  [G ,G ,G ,G ,G ,G ,G ,D ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ],
  [G ,G ,G ,G ,G ,G ,G ,D ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ],
  [G ,G ,G ,G ,G ,G ,G ,D ,D ,D ,D ,D ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ],
  [G ,G2,G ,G ,G ,G ,G ,G ,G ,G ,G ,D ,G ,G ,G ,G ,G ,G ,G2,G ,G ,G ],
  [G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,D ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ],
  [G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,D ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ],
  [G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ],
  [G ,G2,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G2,G ,G ,G ],
  [G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ],
  [G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ],
  [G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ,G ],
];

// ============================================================
// OBJECTS  (placed on top of tiles)
// Each entry: { type, tx, ty, label }
// ============================================================
const OBJECTS = [
  // Trees around edges
  { type:'tree', tx:1,  ty:1,  label:'Maple Tree' },
  { type:'tree', tx:3,  ty:0,  label:'Maple Tree' },
  { type:'tree', tx:18, ty:1,  label:'Maple Tree' },
  { type:'tree', tx:20, ty:2,  label:'Maple Tree' },
  { type:'tree', tx:0,  ty:8,  label:'Maple Tree' },
  { type:'tree', tx:2,  ty:11, label:'Maple Tree' },
  { type:'tree', tx:17, ty:7,  label:'Maple Tree' },
  { type:'tree', tx:19, ty:10, label:'Maple Tree' },
  { type:'tree', tx:1,  ty:20, label:'Maple Tree' },
  { type:'tree', tx:20, ty:20, label:'Maple Tree' },
  { type:'tree', tx:3,  ty:23, label:'Maple Tree' },
  { type:'tree', tx:18, ty:22, label:'Maple Tree' },
  // House (4 tiles wide, placed at origin tile, draws full sprite)
  { type:'house', tx:15, ty:9,  label:'Your Farmhouse' },
  // Chest
  { type:'chest', tx:2,  ty:17, label:'Supply Chest' },
  { type:'chest', tx:19, ty:17, label:'Supply Chest' },
  // Crops on farm plots
  { type:'crop', tx:5,  ty:9,  stage:2, label:'Carrot - Growing' },
  { type:'crop', tx:6,  ty:9,  stage:3, label:'Carrot - Ready!' },
  { type:'crop', tx:7,  ty:9,  stage:1, label:'Seedling' },
  { type:'crop', tx:8,  ty:9,  stage:2, label:'Carrot - Growing' },
  { type:'crop', tx:5,  ty:10, stage:0, label:'Fresh Plot' },
  { type:'crop', tx:6,  ty:10, stage:1, label:'Seedling' },
  { type:'crop', tx:7,  ty:10, stage:3, label:'Tomato - Ready!' },
  { type:'crop', tx:8,  ty:10, stage:2, label:'Tomato - Growing' },
  { type:'crop', tx:9,  ty:10, stage:1, label:'Seedling' },
  { type:'crop', tx:10, ty:10, stage:0, label:'Fresh Plot' },
  { type:'crop', tx:5,  ty:11, stage:3, label:'Mushroom - Ready!' },
  { type:'crop', tx:6,  ty:11, stage:2, label:'Mushroom - Growing' },
  { type:'crop', tx:7,  ty:11, stage:1, label:'Seedling' },
  { type:'crop', tx:9,  ty:11, stage:2, label:'Carrot - Growing' },
  { type:'crop', tx:10, ty:11, stage:3, label:'Carrot - Ready!' },
  { type:'crop', tx:11, ty:11, stage:1, label:'Seedling' },
  // Animals on grass
  { type:'cow',     tx:16, ty:17, label:'Brown Cow' },
  { type:'chicken', tx:14, ty:19, label:'Chicken' },
  { type:'chicken', tx:15, ty:20, label:'Baby Chick' },
];

// ============================================================
// SPRITES  -- loaded images
// ============================================================
const IMG = {};
const SPRITE_PATHS = {
  tileset:  '/assets/Tileset/Tileset Spring.png',
  idle:     '/assets/Character/Idle.png',
  walk:     '/assets/Character/Walk.png',
  house:    '/assets/Objects/House.png',
  tree:     '/assets/Objects/Maple Tree.png',
  chest:    '/assets/Objects/chest.png',
  fence:    '/assets/Objects/Fence\'s copiar.png',
  road:     '/assets/Objects/Road copiar.png',
  crops:    '/assets/Objects/Spring Crops.png',
  cow_f:    '/assets/Farm Animals/Female Cow Brown.png',
  cow_m:    '/assets/Farm Animals/Male Cow Brown.png',
  chicken:  '/assets/Farm Animals/Chicken Red.png',
  chick:    '/assets/Farm Animals/Baby Chicken Yellow.png',
};

function loadSprites() {
  return new Promise(resolve => {
    const keys = Object.keys(SPRITE_PATHS);
    let loaded = 0;
    const bar = document.getElementById('load-bar');
    keys.forEach(k => {
      const img = new Image();
      img.onload = img.onerror = () => {
        IMG[k] = img;
        loaded++;
        bar.style.width = (loaded / keys.length * 100) + '%';
        if (loaded === keys.length) resolve();
      };
      img.src = SPRITE_PATHS[k];
    });
  });
}

// ============================================================
// CANVAS + CAMERA
// ============================================================
const canvas    = document.getElementById('farm-canvas');
const ctx       = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const mmCanvas  = document.getElementById('minimap-canvas');
const mmCtx     = mmCanvas.getContext('2d');
mmCtx.imageSmoothingEnabled = false;

let VW, VH;
let camX = 0, camY = 0;
let hudH = 62;

function resize() {
  VW = window.innerWidth;
  VH = window.innerHeight;
  canvas.width  = VW;
  canvas.height = VH;
  ctx.imageSmoothingEnabled = false;
  // Center on house initially
  camX = 15 * TSIZE - VW / 2 + TSIZE;
  camY = 9  * TSIZE - VH / 2 + TSIZE;
  clampCam();
}

function clampCam() {
  const maxX = MAP_W * TSIZE - VW;
  const maxY = MAP_H * TSIZE - VH;
  camX = Math.max(0, Math.min(camX, Math.max(0, maxX)));
  camY = Math.max(0, Math.min(camY, Math.max(0, maxY)));
}

window.addEventListener('resize', resize);

// ============================================================
// ANIMATION STATE
// ============================================================
let tick = 0;         // incremented each frame
let lastTs = 0;
let frameTimer = 0;
const FRAME_RATE = 120; // ms per anim frame tick

// Character state
const player = {
  tx: 7, ty: 16,       // tile position
  px: 0, py: 0,        // pixel position (computed)
  dir: 0,              // 0=down 1=up 2=side
  moving: false,
  frame: 0,            // walk frame 0-3
  animTimer: 0,
};

// Animal animation states
const animalStates = {};
OBJECTS.filter(o => o.type === 'cow' || o.type === 'chicken').forEach((o, i) => {
  animalStates[i] = { frame: 0, dir: 0, timer: Math.random() * 200, moveTimer: Math.random() * 300 };
});

// ============================================================
// DRAW TILE
// ============================================================
function drawTile(tx, ty, px, py) {
  const t = MAP[ty][tx];
  const ts = IMG.tileset;
  if (!ts || !ts.complete || ts.naturalWidth === 0) {
    // fallback solid color
    const fallback = [['#4a8c2a'],['#52993a'],['#a07848'],['#5a3010'],['#2060b0']];
    ctx.fillStyle = (fallback[t] || fallback[0])[0];
    ctx.fillRect(px, py, TSIZE, TSIZE);
    return;
  }

  if (t === W) {
    // Animated water - blue fill
    ctx.fillStyle = '#2060b0';
    ctx.fillRect(px, py, TSIZE, TSIZE);
    // shimmer
    const o = (tick % 8 < 4) ? 0 : 2;
    ctx.fillStyle = 'rgba(80,160,220,0.4)';
    ctx.fillRect(px + 4*ZOOM + o, py + 4*ZOOM, 6*ZOOM, ZOOM);
    ctx.fillRect(px + 10*ZOOM - o, py + 10*ZOOM, 4*ZOOM, ZOOM);
    return;
  }

  // Draw from tileset
  // Right half of tileset (TS_OX=96) has the tiles
  // Grass tiles: rows 0-3, cols 6-11 (srcX = 96 + 0..47, srcY = 0..47)
  // Dirt tiles: rows 7-10

  let sx, sy;
  if (t === G || t === G2) {
    // Use center grass tile + variation
    sx = TS_OX + (t === G2 ? 16 : 16);
    sy = (t === G2 ? 16 : 0);
  } else if (t === D) {
    // Path/dirt - use from dirt region rows 7-9
    sx = TS_OX + 16;
    sy = 8 * TILE;
  } else if (t === F) {
    // Farm plot tilled soil - use dirt with darker look
    sx = TS_OX + 0;
    sy = 8 * TILE;
  } else {
    sx = TS_OX + 16; sy = 0;
  }

  ctx.drawImage(ts, sx, sy, TILE, TILE, px, py, TSIZE, TSIZE);
}

// ============================================================
// DRAW OBJECT
// ============================================================
function drawObject(obj, px, py) {
  switch(obj.type) {
    case 'tree':    drawTree(px, py); break;
    case 'house':   drawHouse(px, py); break;
    case 'chest':   drawChest(px, py); break;
    case 'crop':    drawCrop(px, py, obj.stage); break;
    case 'cow':     drawCow(px, py, obj); break;
    case 'chicken': drawChicken(px, py, obj); break;
  }
}

function drawTree(px, py) {
  const img = IMG.tree;
  if (!img || !img.complete || img.naturalWidth === 0) {
    // fallback
    ctx.fillStyle = '#2a6010';
    ctx.fillRect(px - TSIZE/2, py - TSIZE, TSIZE*2, TSIZE*2);
    return;
  }
  // Tree sprite sheet: 160x48, 10 cols x 3 rows
  // Full grown tree is at cols 4-5 (2 wide x 2 tall = 32x32 source)
  // It's a growth animation - stage 3 (biggest) starts at col 6
  // From image: seedling col0, small col1-2, medium col3-4, big col5-7, full col6-9
  // Use the full grown tree: source at x=6*16=96, y=0, w=32, h=32
  const sx = 6 * TILE;
  const sy = 0;
  const sw = 32; const sh = 32;
  // Draw at double size, offset up so roots sit on tile
  ctx.drawImage(img, sx, sy, sw, sh, px - TSIZE, py - TSIZE, TSIZE*2, TSIZE*2);
}

function drawHouse(px, py) {
  const img = IMG.house;
  if (!img || !img.complete || img.naturalWidth === 0) {
    ctx.fillStyle = '#c0784a';
    ctx.fillRect(px, py - TSIZE*2, TSIZE*3, TSIZE*3);
    return;
  }
  // House.png: 224x112 = 14 cols x 7 rows
  // Left house (complete) occupies roughly cols 0-5, rows 0-6
  // Right house (complete) occupies cols 8-13, rows 0-6
  // Use RIGHT house: sx=8*16=128, sy=0, sw=6*16=96, sh=7*16=112
  // Actually from the grid image the right house starts around col 8
  const sx = 8 * TILE; const sy = 0;
  const sw = 6 * TILE; const sh = 7 * TILE;
  // Draw 3x tall, 3x wide, offset up
  ctx.drawImage(img, sx, sy, sw, sh, px - TSIZE, py - TSIZE*3, sw * ZOOM, sh * ZOOM);
}

function drawChest(px, py) {
  const img = IMG.chest;
  if (!img || !img.complete || img.naturalWidth === 0) {
    ctx.fillStyle = '#8b5e20';
    ctx.fillRect(px + 4, py + 8, TSIZE - 8, TSIZE - 8);
    return;
  }
  // chest.png: 32x32 = 2 cols x 2 rows
  // Top row = closed, bottom = open. Use closed (row 0)
  const bob = (tick % 16 < 8) ? 0 : -ZOOM;
  ctx.drawImage(img, 0, 0, 16, 16, px + 4, py + 4 + bob, TSIZE - 8, TSIZE - 8);
}

function drawCrop(px, py, stage) {
  const img = IMG.crops;
  if (!img || !img.complete || img.naturalWidth === 0) {
    ctx.fillStyle = stage >= 3 ? '#22c55e' : '#a8ff78';
    ctx.fillRect(px + 8, py + 8, TSIZE - 16, TSIZE - 16);
    return;
  }
  // Spring_Crops.png: 224x128 = 14 cols x 8 rows
  // Each crop type is in a row, growth stages in cols
  // Row 0 = carrot stages, row 2 = tomato, row 4 = mushroom-ish
  // Stage 0=bare,1=sprout,2=growing,3=ready  -> cols 0,1,2,3
  const cropRow = 0; // carrot row for now
  const sx = Math.min(stage, 3) * TILE;
  const sy = cropRow * TILE;
  // Small crop drawn centered in tile
  const bob = (tick % 20 < 10) ? 0 : -1;
  ctx.drawImage(img, sx, sy, TILE, TILE, px + 4, py + 4 + bob * ZOOM, TSIZE - 8, TSIZE - 8);
}

function drawCow(px, py, obj) {
  const img = IMG.cow_f;
  if (!img || !img.complete || img.naturalWidth === 0) {
    ctx.fillStyle = '#c8a078';
    ctx.fillRect(px, py + 8, TSIZE + 8, TSIZE - 8);
    return;
  }
  // Female_Cow_Brown.png: 128x96 = 8 cols x 6 rows
  // Rows: 0=down, 1=?, 2=side1, 3=side2, 4=up, 5=?
  // 4 frames per direction (cols 0-3 per anim)
  const idx = OBJECTS.findIndex(o => o === obj);
  const st = animalStates[idx] || { frame: 0, dir: 0 };
  const row = st.dir * 2; // each dir takes 2 rows? let's use row 0 for idle
  const frame = st.frame % 4;
  ctx.drawImage(img, frame * TILE, row * TILE, TILE, TILE*2,
    px - 4, py - TSIZE/2, TSIZE + 8, TSIZE * 2);
}

function drawChicken(px, py, obj) {
  const img = IMG.chicken;
  if (!img || !img.complete || img.naturalWidth === 0) {
    ctx.fillStyle = '#e84020';
    ctx.fillRect(px + 8, py + 12, TSIZE - 16, TSIZE - 16);
    return;
  }
  // Chicken_Red.png: 64x32 = 4 cols x 2 rows
  const idx = OBJECTS.findIndex(o => o === obj);
  const st = animalStates[idx] || { frame: 0, dir: 0 };
  const frame = st.frame % 4;
  const row = st.dir % 2;
  ctx.drawImage(img, frame * TILE, row * TILE, TILE, TILE,
    px + 8, py + 12, TSIZE - 16, TSIZE - 16);
}

// ============================================================
// DRAW PLAYER
// ============================================================
function drawPlayer() {
  const px = player.tx * TSIZE - camX;
  const py = player.ty * TSIZE - camY;

  if (player.moving && IMG.walk && IMG.walk.complete && IMG.walk.naturalWidth > 0) {
    // Walk.png: 192x96, 16w x 32h per frame, 12 cols x 3 rows
    // Row 0 = down, row 1 = up, row 2 = side
    const frame = player.frame % 6; // 6 walk frames per dir? use % 4 safely
    const col   = (player.frame % 4) * 2; // each "frame" is 2 cols of 16px? 
    // Actually: 12 cols / 3 rows = 4 frames per direction
    const f = player.frame % 4;
    const row = player.dir; // 0=down,1=up,2=side
    // flip if going right (dir=2 side)
    const flip = player.flipX;

    ctx.save();
    if (flip) {
      ctx.translate(px + TSIZE, py);
      ctx.scale(-1, 1);
      ctx.drawImage(IMG.walk, f * CHAR_W, row * CHAR_H, CHAR_W, CHAR_H,
        0, -TSIZE, TSIZE, TSIZE * 2);
    } else {
      ctx.drawImage(IMG.walk, f * CHAR_W, row * CHAR_H, CHAR_W, CHAR_H,
        px, py - TSIZE, TSIZE, TSIZE * 2);
    }
    ctx.restore();
  } else if (IMG.idle && IMG.idle.complete && IMG.idle.naturalWidth > 0) {
    // Idle.png: 128x96, 32w x 32h per frame, 4 cols x 3 rows
    // Row 0=down, row1=up, row2=side
    const f = Math.floor(tick / 6) % 4;
    const row = player.dir;

    ctx.save();
    if (player.flipX) {
      ctx.translate(px + TSIZE, py);
      ctx.scale(-1, 1);
      ctx.drawImage(IMG.idle, f * IDLE_W, row * IDLE_H, IDLE_W, IDLE_H,
        0, -TSIZE, TSIZE * 2, TSIZE * 2);
    } else {
      ctx.drawImage(IMG.idle, f * IDLE_W, row * IDLE_H, IDLE_W, IDLE_H,
        px - TSIZE/2, py - TSIZE, TSIZE * 2, TSIZE * 2);
    }
    ctx.restore();
  } else {
    // fallback square
    ctx.fillStyle = '#4fa8fd';
    ctx.fillRect(px + 8, py, TSIZE - 16, TSIZE);
  }
}

// ============================================================
// MAIN DRAW LOOP
// ============================================================
function draw(ts) {
  requestAnimationFrame(draw);

  const dt = ts - lastTs;
  lastTs = ts;

  frameTimer += dt;
  if (frameTimer >= FRAME_RATE) {
    tick++;
    frameTimer -= FRAME_RATE;
    // advance animal frames
    Object.keys(animalStates).forEach(i => {
      const st = animalStates[i];
      st.timer++;
      if (st.timer % 6 === 0) st.frame++;
    });
  }

  ctx.clearRect(0, 0, VW, VH);

  // Sky/bg
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0, 0, VW, VH);

  const tileStartX = Math.max(0, Math.floor(camX / TSIZE));
  const tileStartY = Math.max(0, Math.floor(camY / TSIZE));
  const tileEndX   = Math.min(MAP_W, Math.ceil((camX + VW) / TSIZE));
  const tileEndY   = Math.min(MAP_H, Math.ceil((camY + VH) / TSIZE));

  // PASS 1: Ground tiles
  for (let ty = tileStartY; ty < tileEndY; ty++) {
    for (let tx = tileStartX; tx < tileEndX; tx++) {
      const px = tx * TSIZE - camX;
      const py = ty * TSIZE - camY;
      drawTile(tx, ty, px, py);
    }
  }

  // PASS 2: Objects sorted by Y (painter's algorithm for depth)
  const visObjects = OBJECTS.filter(o =>
    o.tx >= tileStartX - 2 && o.tx <= tileEndX + 2 &&
    o.ty >= tileStartY - 2 && o.ty <= tileEndY + 2
  );
  // Sort Y so objects lower on screen draw over those higher up
  visObjects.sort((a, b) => a.ty - b.ty);

  visObjects.forEach(obj => {
    const px = obj.tx * TSIZE - camX;
    const py = obj.ty * TSIZE - camY;
    drawObject(obj, px, py);
  });

  // PASS 3: Player
  drawPlayer();

  // PASS 4: Minimap
  drawMinimap();
}

// ============================================================
// MINIMAP
// ============================================================
function drawMinimap() {
  const mw = 76, mh = 76;
  const tw = mw / MAP_W, th = mh / MAP_H;
  mmCtx.clearRect(0, 0, mw, mh);

  for (let ty = 0; ty < MAP_H; ty++) {
    for (let tx = 0; tx < MAP_W; tx++) {
      const t = MAP[ty][tx];
      let col = '#3a7020';
      if (t === W) col = '#2060b0';
      else if (t === D) col = '#a07848';
      else if (t === F) col = '#5a3010';
      else if (t === G2) col = '#4a9030';
      mmCtx.fillStyle = col;
      mmCtx.fillRect(tx * tw, ty * th, tw + 0.5, th + 0.5);
    }
  }

  // Objects on minimap
  OBJECTS.forEach(o => {
    let col = null;
    if (o.type === 'tree')    col = '#1a5010';
    else if (o.type === 'house') col = '#c0784a';
    else if (o.type === 'chest') col = '#d4aa40';
    if (col) {
      mmCtx.fillStyle = col;
      mmCtx.fillRect(o.tx * tw, o.ty * th, tw + 1, th + 1);
    }
  });

  // Player dot
  mmCtx.fillStyle = '#4fa8fd';
  mmCtx.fillRect(player.tx * tw - 1, player.ty * th - 1, 3, 3);

  // Viewport rect
  const vx = (camX / TSIZE) * tw;
  const vy = (camY / TSIZE) * th;
  const vw = (VW / TSIZE) * tw;
  const vh = (VH / TSIZE) * th;
  mmCtx.strokeStyle = 'rgba(168,255,120,0.65)';
  mmCtx.lineWidth = 1;
  mmCtx.strokeRect(vx, vy, Math.min(vw, mw), Math.min(vh, mh));
}

// ============================================================
// INPUT / PAN
// ============================================================
let drag = { active: false, startX: 0, startY: 0, camStartX: 0, camStartY: 0, moved: false };
let touchStart = null;

canvas.addEventListener('mousedown', e => {
  drag = { active: true, startX: e.clientX, startY: e.clientY,
           camStartX: camX, camStartY: camY, moved: false };
});
canvas.addEventListener('mousemove', e => {
  if (!drag.active) return;
  const dx = e.clientX - drag.startX;
  const dy = e.clientY - drag.startY;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) drag.moved = true;
  camX = drag.camStartX - dx;
  camY = drag.camStartY - dy;
  clampCam();
  updateCoord(e.clientX, e.clientY);
});
canvas.addEventListener('mouseup', e => {
  if (!drag.moved) handleTap(e.clientX, e.clientY);
  drag.active = false;
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    const t = e.touches[0];
    drag = { active: true, startX: t.clientX, startY: t.clientY,
             camStartX: camX, camStartY: camY, moved: false };
    touchStart = { x: t.clientX, y: t.clientY, ts: Date.now() };
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!drag.active || e.touches.length !== 1) return;
  const t = e.touches[0];
  const dx = t.clientX - drag.startX;
  const dy = t.clientY - drag.startY;
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) drag.moved = true;
  camX = drag.camStartX - dx;
  camY = drag.camStartY - dy;
  clampCam();
  updateCoord(t.clientX, t.clientY);
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (!drag.moved && touchStart && Date.now() - touchStart.ts < 250) {
    const t = e.changedTouches[0];
    handleTap(t.clientX, t.clientY);
  }
  drag.active = false; touchStart = null;
}, { passive: false });

function updateCoord(cx, cy) {
  const tx = Math.floor((cx + camX) / TSIZE);
  const ty = Math.floor((cy + camY) / TSIZE);
  document.getElementById('coord-display').textContent = tx + ', ' + ty;
}

// ============================================================
// TAP HANDLER  - move player + tooltip
// ============================================================
const tooltip = document.getElementById('tooltip');
let tipTimer = null;

function handleTap(cx, cy) {
  const tx = Math.floor((cx + camX) / TSIZE);
  const ty = Math.floor((cy + camY) / TSIZE);
  if (tx < 0 || tx >= MAP_W || ty < 0 || ty >= MAP_H) return;

  // Move player toward tapped tile
  const oldTx = player.tx;
  player.tx = tx;
  player.ty = ty;

  // Determine direction faced
  const dx = tx - oldTx;
  const dy = ty - oldTy || 0;
  if (Math.abs(dx) > Math.abs(dy)) {
    player.dir = 2; // side
    player.flipX = dx > 0;
  } else if (dy < 0) {
    player.dir = 1; // up
    player.flipX = false;
  } else {
    player.dir = 0; // down
    player.flipX = false;
  }
  player.moving = true;
  player.frame = (player.frame + 1) % 4;
  setTimeout(() => { player.moving = false; }, 400);

  // Pan camera to follow player
  camX = tx * TSIZE - VW / 2 + TSIZE / 2;
  camY = ty * TSIZE - VH / 2 + TSIZE / 2;
  clampCam();

  // Tooltip for object at tile
  const obj = OBJECTS.find(o => o.tx === tx && o.ty === ty);
  if (obj) showTooltip(obj.label, cx, cy);
  else {
    const labels = { 0:'Grassland', 1:'Meadow', 2:'Dirt Path', 3:'Farm Plot', 4:'Water' };
    showTooltip(labels[MAP[ty][tx]] || 'Land', cx, cy);
  }
}

let oldTy = 0;

function showTooltip(text, x, y) {
  tooltip.textContent = text;
  const tx2 = Math.min(x + 8, VW - 160);
  const ty2 = Math.max(y - 44, 60);
  tooltip.style.left = tx2 + 'px';
  tooltip.style.top  = ty2 + 'px';
  tooltip.classList.add('show');
  clearTimeout(tipTimer);
  tipTimer = setTimeout(() => tooltip.classList.remove('show'), 2000);
}

// HUD button tabs
document.querySelectorAll('.hud-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.hud-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// ============================================================
// BOOT
// ============================================================
async function boot() {
  resize();
  player.px = player.tx * TSIZE;
  player.py = player.ty * TSIZE;

  await loadSprites();

  // Hide loading
  const loading = document.getElementById('loading');
  loading.classList.add('hidden');
  setTimeout(() => loading.style.display = 'none', 600);

  requestAnimationFrame(draw);
}

boot();
</script>
